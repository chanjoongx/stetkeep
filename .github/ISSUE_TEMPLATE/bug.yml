name: Bug report
description: Something in stetkeep isn't working as documented.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in the fields below so the issue can be reproduced quickly.
        For security vulnerabilities, do **not** use this form — see `SECURITY.md`.
  - type: input
    id: version
    attributes:
      label: stetkeep version
      description: Output of `npx stetkeep --version` or `npm view stetkeep version`
      placeholder: "0.4.4"
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      description: Output of `claude --version`
      placeholder: "e.g. 2.3.1"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows (PowerShell)
        - Windows (Git Bash / WSL)
        - Other
    validations:
      required: true
  - type: dropdown
    id: install-path
    attributes:
      label: Install path
      options:
        - npm (npx stetkeep install)
        - Claude Code plugin marketplace
        - git clone (node lib/install.js)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include exact error messages and the output of `npx stetkeep scan` if relevant.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest set of steps that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: hook-output
    attributes:
      label: Hook output (if hook-related)
      description: |
        For Safety Net hook bugs, run:
        ```
        echo '{"tool_name":"Edit","tool_input":{"file_path":"YOUR_PATH"}}' | bash .claude/hooks/safety-net.sh
        ```
        Paste the output here.
      render: shell
